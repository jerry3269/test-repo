services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.2.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\"'"]
      interval: 10s
      timeout: 5s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:9.2.2
    container_name: kibana
    restart: always
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    volumes:
      - ./elk/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro

  logstash:
    image: docker.elastic.co/logstash/logstash:9.2.2
    container_name: logstash
    ports:
      - "5044:5044"
      - "5000:5000"
    depends_on:
      - elasticsearch
    volumes:
      - ./elk/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
  
  filebeat:
    image: docker.elastic.co/beats/filebeat:9.2.2
    container_name: filebeat
    user: root
    volumes:
      - spring_logs:/var/log/spring-app:ro
      - ./elk/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml
    depends_on:
      - logstash
    entrypoint: >
      sh -c "chown root:root /usr/share/filebeat/filebeat.yml &&
         chmod go-w /usr/share/filebeat/filebeat.yml &&
         filebeat -e -c /usr/share/filebeat/filebeat.yml"

  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: spring-app
    restart: unless-stopped
    volumes:
      - spring_logs:/app/logs
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m
    depends_on:
      - elasticsearch
      - logstash

volumes:
  spring_logs:
  esdata:

















